<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    >
    <title>Карта твоего дня</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg-top: #072321;
        --bg-bottom: #031018;
        --gold: #dcc181;
        --gold-soft: rgba(220, 193, 129, 0.2);
        --text: #efe1b8;
        --muted: #c8bb96;
        --panel: rgba(8, 21, 30, 0.72);
        --button-bg: rgba(7, 19, 31, 0.78);
        --button-border: rgba(220, 193, 129, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        overflow-x: hidden;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at 50% 18%, rgba(30, 120, 92, 0.28), transparent 24%),
          radial-gradient(circle at 18% 88%, rgba(16, 69, 58, 0.26), transparent 20%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }

      body::before {
        top: 2%;
        left: 50%;
        width: 240px;
        height: 240px;
        transform: translateX(-50%);
        background: rgba(36, 135, 102, 0.14);
      }

      body::after {
        right: -50px;
        bottom: 8%;
        width: 180px;
        height: 180px;
        background: rgba(11, 86, 77, 0.16);
      }

      .page {
        position: relative;
        width: min(100%, 470px);
        min-height: 100vh;
        margin: 0 auto;
        padding: 26px 18px 28px;
      }

      .stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(250, 232, 183, 0.92);
        box-shadow: 0 0 14px rgba(250, 232, 183, 0.72);
        animation: pulse 2.8s ease-in-out infinite;
      }

      .hero {
        position: relative;
        text-align: center;
        z-index: 2;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 400;
        letter-spacing: 0.02em;
      }

      .date {
        margin-top: 8px;
        font-size: 14px;
        color: var(--muted);
      }

      .chooser {
        position: relative;
        margin-top: 28px;
        text-align: center;
        z-index: 2;
        transition: transform 0.5s ease;
      }

      .chooser.is-transitioned {
        transform: translateY(10px);
      }

      .chooser-text {
        max-width: 320px;
        margin: 0 auto 22px;
        font-size: 19px;
        line-height: 1.45;
        transition: opacity 0.35s ease, transform 0.35s ease;
      }

      .chooser.is-transitioned .chooser-text {
        opacity: 0;
        transform: translateY(-10px);
      }

      .chooser-text strong {
        font-weight: 400;
        color: #f5e6ba;
      }

      .deck {
        position: relative;
        height: 390px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.6s ease;
      }

      .chooser.is-transitioned .deck {
        transform: translateY(-6px);
      }

      .deck-card {
        position: absolute;
        width: 146px;
        height: 250px;
        border: 0;
        padding: 0;
        border-radius: 24px;
        cursor: pointer;
        background: transparent;
        transform-style: preserve-3d;
        perspective: 1200px;
        transition:
          transform 0.95s cubic-bezier(0.2, 0.8, 0.2, 1),
          opacity 0.55s ease,
          filter 0.55s ease;
      }

      .deck-card::before {
        content: "";
        position: absolute;
        inset: -18px;
        border-radius: 32px;
        background: radial-gradient(circle, rgba(220, 193, 129, 0.18), transparent 68%);
        opacity: 0;
        transition: opacity 0.45s ease;
      }

      .deck-card:hover::before {
        opacity: 1;
      }

      .deck-card.is-left {
        transform: translateX(-88px) rotate(-13deg);
      }

      .deck-card.is-center {
        transform: translateY(-4px);
        z-index: 2;
      }

      .deck-card.is-right {
        transform: translateX(88px) rotate(13deg);
      }

      .deck-card.is-dimmed {
        opacity: 0;
        filter: blur(10px);
        pointer-events: none;
      }

      .deck-card.is-selected {
        z-index: 8;
        transform: translateX(0) translateY(8px) scale(1.2);
      }

      .deck-card.is-revealed {
        transform: translateX(0) translateY(46px) scale(1.62);
      }

      .card-face {
        position: absolute;
        inset: 0;
        border-radius: 24px;
        backface-visibility: hidden;
        overflow: hidden;
      }

      .card-back {
        border: 1px solid rgba(220, 193, 129, 0.22);
        background:
          radial-gradient(circle at 50% 26%, rgba(220, 193, 129, 0.12), transparent 18%),
          linear-gradient(180deg, rgba(15, 42, 49, 0.96), rgba(6, 18, 26, 0.98));
        box-shadow:
          0 0 0 1px rgba(220, 193, 129, 0.1),
          0 16px 42px rgba(0, 0, 0, 0.4);
      }

      .card-back::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 18px;
        border: 1px solid rgba(220, 193, 129, 0.14);
      }

      .card-back::after {
        content: "✦";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 34px;
        color: rgba(220, 193, 129, 0.88);
        text-shadow: 0 0 16px rgba(220, 193, 129, 0.36);
      }

      .back-ornament {
        position: absolute;
        inset: 28px;
        border-radius: 16px;
        border: 1px solid rgba(220, 193, 129, 0.08);
      }

      .back-ornament::before,
      .back-ornament::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(220, 193, 129, 0.12);
      }

      .back-ornament::before {
        inset: 14px 28px;
      }

      .back-ornament::after {
        inset: 58px 42px;
      }

      .card-front {
        transform: rotateY(180deg);
        color: var(--text);
        border: 1px solid rgba(220, 193, 129, 0.18);
        background:
          linear-gradient(180deg, rgba(16, 39, 49, 0.88), rgba(6, 17, 24, 0.96)),
          radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.06), transparent 28%);
        box-shadow:
          0 0 0 1px rgba(220, 193, 129, 0.1),
          0 18px 52px rgba(0, 0, 0, 0.54),
          0 0 44px rgba(220, 193, 129, 0.16);
      }

      .card-front.has-full-art {
        background:
          linear-gradient(180deg, rgba(16, 39, 49, 0.82), rgba(6, 17, 24, 0.94));
      }

      .card-front::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 18px;
        border: 1px solid rgba(220, 193, 129, 0.14);
      }

      .deck-card.is-revealed .card-back {
        transform: rotateY(180deg);
      }

      .deck-card.is-revealed .card-front {
        transform: rotateY(360deg);
      }

      .card-title {
        position: relative;
        z-index: 1;
        padding-top: 18px;
        text-align: center;
        font-size: 16px;
        letter-spacing: 0.12em;
        color: var(--gold);
      }

      .card-image {
        position: relative;
        z-index: 1;
        width: calc(100% - 28px);
        height: 138px;
        margin: 14px auto 10px;
        border-radius: 16px;
        overflow: hidden;
        background:
          radial-gradient(circle at 48% 48%, rgba(255, 244, 204, 0.58), rgba(255, 244, 204, 0) 20%),
          linear-gradient(180deg, #536b70 0%, #23393d 42%, #121f2a 100%);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .card-front.has-full-art .card-image {
        width: calc(100% - 18px);
        height: calc(100% - 18px);
        margin: 9px auto;
        border-radius: 18px;
        background: transparent;
      }

      .card-art {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      .card-image.has-art .card-art {
        display: block;
      }

      .card-front.has-full-art .card-art {
        object-fit: contain;
        background: #08151d;
      }

      .card-image.has-art .beam,
      .card-image.has-art .beam-glow,
      .card-image.has-art .tower,
      .card-image.has-art .mist {
        opacity: 0;
      }

      .card-front.has-full-art .card-title,
      .card-front.has-full-art .caption {
        display: none;
      }

      .mist {
        position: absolute;
        inset: auto -10% 0;
        height: 44%;
        background:
          radial-gradient(circle at 20% 30%, rgba(237, 237, 237, 0.34), transparent 18%),
          radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.28), transparent 24%),
          radial-gradient(circle at 78% 34%, rgba(240, 240, 240, 0.26), transparent 20%),
          linear-gradient(180deg, transparent, rgba(223, 227, 227, 0.22));
        filter: blur(8px);
      }

      .beam {
        position: absolute;
        top: 48px;
        left: 56px;
        width: 86px;
        height: 18px;
        background: linear-gradient(90deg, rgba(255, 246, 216, 0.86), rgba(255, 246, 216, 0.04));
        clip-path: polygon(0 38%, 100% 0, 100% 100%, 0 62%);
      }

      .beam-glow {
        position: absolute;
        top: 36px;
        left: 52px;
        width: 98px;
        height: 36px;
        background: radial-gradient(circle at left center, rgba(255, 245, 215, 0.46), transparent 70%);
        filter: blur(7px);
      }

      .tower {
        position: absolute;
        right: 36px;
        bottom: 32px;
        width: 22px;
        height: 76px;
        background: linear-gradient(180deg, #0d1419 0%, #1b2326 100%);
        clip-path: polygon(28% 100%, 34% 58%, 42% 40%, 48% 10%, 52% 10%, 58% 40%, 66% 58%, 72% 100%);
      }

      .tower::before {
        content: "";
        position: absolute;
        top: 4px;
        left: 6px;
        width: 10px;
        height: 11px;
        border-radius: 5px 5px 2px 2px;
        background: linear-gradient(180deg, #ffeec1 0%, #e2be7b 100%);
        box-shadow: 0 0 14px rgba(255, 236, 183, 0.56);
      }

      .caption {
        position: relative;
        z-index: 1;
        padding: 0 16px;
        text-align: center;
        font-size: 9px;
        line-height: 1.3;
        color: rgba(239, 226, 187, 0.8);
      }

      .reveal-panel {
        position: relative;
        z-index: 2;
        margin-top: 28px;
        text-align: center;
        opacity: 0;
        transform: translateY(16px);
        pointer-events: none;
        transition: opacity 0.55s ease, transform 0.55s ease;
      }

      .reveal-panel.is-visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .message {
        max-width: 330px;
        margin: 0 auto;
        font-size: 18px;
        line-height: 1.55;
      }

      .focus-box {
        margin: 18px auto 0;
        max-width: 340px;
        padding: 14px 16px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid rgba(220, 193, 129, 0.16);
      }

      .focus-label {
        display: block;
        margin-bottom: 7px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(220, 193, 129, 0.82);
      }

      .focus-value {
        font-size: 16px;
        line-height: 1.45;
      }

      .actions {
        margin-top: 22px;
      }

      .primary {
        width: 100%;
        border: 1px solid var(--button-border);
        border-radius: 16px;
        padding: 16px 18px;
        font: inherit;
        font-size: 18px;
        color: var(--text);
        background: var(--button-bg);
        box-shadow: 0 0 20px rgba(220, 193, 129, 0.08);
      }

      .footnote {
        margin-top: 16px;
        font-size: 14px;
        color: rgba(220, 193, 129, 0.82);
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 0.28;
          transform: scale(0.92);
        }
        50% {
          opacity: 1;
          transform: scale(1.12);
        }
      }

      @media (max-width: 400px) {
        .deck {
          height: 350px;
        }

        .deck-card {
          width: 128px;
          height: 220px;
        }

        .deck-card.is-left {
          transform: translateX(-72px) rotate(-12deg);
        }

        .deck-card.is-right {
          transform: translateX(72px) rotate(12deg);
        }

        .deck-card.is-selected {
          transform: translateX(0) translateY(8px) scale(1.14);
        }

        .deck-card.is-revealed {
          transform: translateX(0) translateY(36px) scale(1.48);
        }

        .chooser-text,
        .message {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="stars" aria-hidden="true">
        <span class="star" style="top: 9%; left: 14%; animation-delay: 0.2s;"></span>
        <span class="star" style="top: 14%; left: 81%; animation-delay: 1.2s;"></span>
        <span class="star" style="top: 27%; left: 9%; animation-delay: 0.8s;"></span>
        <span class="star" style="top: 34%; left: 88%; animation-delay: 1.8s;"></span>
        <span class="star" style="top: 48%; left: 14%; animation-delay: 1s;"></span>
        <span class="star" style="top: 61%; left: 86%; animation-delay: 0.6s;"></span>
        <span class="star" style="top: 78%; left: 11%; animation-delay: 1.5s;"></span>
        <span class="star" style="top: 88%; left: 76%; animation-delay: 0.9s;"></span>
      </div>

      <section class="hero">
        <h1>Карта твоего дня ✨</h1>
        <div class="date" id="dateLabel">[Сегодня]</div>
      </section>

      <section class="chooser" id="chooser">
        <p class="chooser-text">
          Расслабься и выбери ту карту, которая <strong>притягивает тебя сильнее всего</strong>.
        </p>

        <div class="deck" id="deck">
          <button class="deck-card is-left" type="button" data-index="0" aria-label="Выбрать первую карту">
            <span class="card-face card-back"><span class="back-ornament"></span></span>
            <span class="card-face card-front">
              <div class="card-title"></div>
              <div class="card-image">
                <img class="card-art" alt="">
                <div class="beam-glow"></div>
                <div class="beam"></div>
                <div class="tower"></div>
                <div class="mist"></div>
              </div>
              <div class="caption"></div>
            </span>
          </button>

          <button class="deck-card is-center" type="button" data-index="1" aria-label="Выбрать вторую карту">
            <span class="card-face card-back"><span class="back-ornament"></span></span>
            <span class="card-face card-front">
              <div class="card-title"></div>
              <div class="card-image">
                <img class="card-art" alt="">
                <div class="beam-glow"></div>
                <div class="beam"></div>
                <div class="tower"></div>
                <div class="mist"></div>
              </div>
              <div class="caption"></div>
            </span>
          </button>

          <button class="deck-card is-right" type="button" data-index="2" aria-label="Выбрать третью карту">
            <span class="card-face card-back"><span class="back-ornament"></span></span>
            <span class="card-face card-front">
              <div class="card-title"></div>
              <div class="card-image">
                <img class="card-art" alt="">
                <div class="beam-glow"></div>
                <div class="beam"></div>
                <div class="tower"></div>
                <div class="mist"></div>
              </div>
              <div class="caption"></div>
            </span>
          </button>
        </div>
      </section>

      <section class="reveal-panel" id="revealPanel">
        <div class="message" id="message"></div>
        <div class="focus-box">
          <span class="focus-label">Послание</span>
          <div class="focus-value" id="focusValue"></div>
        </div>
        <div class="actions">
          <button class="primary" id="shareButton">Принять послание</button>
        </div>
        <div class="footnote">Доступно раз в сутки. ✨</div>
      </section>
    </main>

    <script>
      const cards = [
        {
          title: "ФОКУС",
          caption: "A clear beam cuts through uncertainty",
          message: "Сегодня твоя сила в умении отсекать лишнее. Не пытайся объять необъятное. Выбери одну главную задачу или эмоцию и направь туда все свое внимание.",
          focus: "Одна точка внимания даст больше, чем десять начатых направлений.",
          shareTitle: "Фокус",
          mantra: "Я собираю свою энергию в одну ясную цель.",
          image: ""
        },
        {
          title: "ПОТОК",
          caption: "The river moves without forcing the shore",
          message: "День не про рывок, а про мягкое течение. Позволь событиям раскрыться в своем темпе и не торопи то, что должно созреть естественно.",
          focus: "Мягкость сегодня сильнее давления.",
          shareTitle: "Поток",
          mantra: "Я доверяю ритму жизни и не спорю с ним.",
          image: ""
        },
        {
          title: "ИМПУЛЬС",
          caption: "A spark appears before the path is fully seen",
          message: "Сейчас не нужно ждать полной уверенности. Достаточно почувствовать внутренний импульс и сделать один живой шаг туда, где давно назрело движение.",
          focus: "Решительность рождается в действии.",
          shareTitle: "Импульс",
          mantra: "Я выбираю смелость раньше идеальной ясности.",
          image: ""
        },
        {
          title: "ЗАЗЕМЛЕНИЕ",
          caption: "The strongest roots grow in stillness",
          message: "Сегодня твоя сила в опоре на реальность. Обрати внимание на тело, найди ясность в простых действиях и не пытайся решать все сразу.",
          focus: "Почувствуй почву под ногами и вернись к самому важному.",
          shareTitle: "Заземление",
          mantra: "Я строю устойчивость через простые и верные шаги.",
          image: "zazemlenie_optimized.png"
        },
        {
          title: "ЗЕРКАЛО",
          caption: "What touches you reveals what is ready to heal",
          message: "Все, что сегодня отзовется особенно сильно, может оказаться важной подсказкой. Не спеши защищаться. Сначала посмотри, что именно жизнь показывает тебе через отражение.",
          focus: "Наблюдение важнее мгновенной реакции.",
          shareTitle: "Зеркало",
          mantra: "Я выбираю осознанность там, где раньше была автоматичность.",
          image: ""
        },
        {
          title: "РАСКРЫТИЕ",
          caption: "A quiet opening changes the whole horizon",
          message: "День помогает заметить дверь, которую ты раньше не рассматривала всерьез. Присмотрись к новой идее, разговору или приглашению: в них может скрываться следующий этап.",
          focus: "Новое приходит мягко, а не громко.",
          shareTitle: "Раскрытие",
          mantra: "Я открыта тому, что приходит вовремя.",
          image: ""
        }
      ];

      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
      if (tg) {
        tg.ready();
        tg.expand();
      }

      const dateFormatter = new Intl.DateTimeFormat("ru-RU", {
        weekday: "long",
        day: "numeric",
        month: "long"
      });

      const chooser = document.getElementById("chooser");
      const revealPanel = document.getElementById("revealPanel");
      const deckCards = Array.from(document.querySelectorAll(".deck-card"));
      let selectedCard = null;

      function hashString(input) {
        let hash = 0;
        for (let i = 0; i < input.length; i += 1) {
          hash = (hash << 5) - hash + input.charCodeAt(i);
          hash |= 0;
        }
        return Math.abs(hash);
      }

      function createSeededRandom(seed) {
        let state = seed % 2147483647;
        if (state <= 0) {
          state += 2147483646;
        }

        return function next() {
          state = (state * 16807) % 2147483647;
          return (state - 1) / 2147483646;
        };
      }

      function pickDailyCards(seed) {
        const random = createSeededRandom(seed);
        const pool = [...cards];

        for (let i = pool.length - 1; i > 0; i -= 1) {
          const j = Math.floor(random() * (i + 1));
          const temp = pool[i];
          pool[i] = pool[j];
          pool[j] = temp;
        }

        return pool.slice(0, Math.min(3, pool.length));
      }

      function formatDate(now) {
        const raw = dateFormatter.format(now);
        return "[" + raw.charAt(0).toUpperCase() + raw.slice(1) + "]";
      }

      function getDailySet() {
        const now = new Date();
        const userId = tg && tg.initDataUnsafe && tg.initDataUnsafe.user
          ? String(tg.initDataUnsafe.user.id)
          : "guest";
        const seed = userId + "|" + now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
        const set = pickDailyCards(hashString(seed));

        return {
          set,
          dateLabel: formatDate(now)
        };
      }

      function resolveAssetUrl(path) {
        if (!path) {
          return "";
        }
        if (path.startsWith("http://") || path.startsWith("https://") || path.startsWith("/")) {
          return path;
        }
        return "./assets/cards/" + path;
      }

      function renderDeck(cardSet) {
        deckCards.forEach((button, index) => {
          const card = cardSet[index];
          const front = button.querySelector(".card-front");
          button.querySelector(".card-title").textContent = card.title;
          button.querySelector(".caption").textContent = card.caption;
          const image = button.querySelector(".card-image");
          const art = button.querySelector(".card-art");
          const assetUrl = resolveAssetUrl(card.image);
          if (assetUrl) {
            image.classList.add("has-art");
            front.classList.add("has-full-art");
            art.src = assetUrl;
            art.alt = card.title;
          } else {
            image.classList.remove("has-art");
            front.classList.remove("has-full-art");
            art.removeAttribute("src");
            art.alt = "";
          }
          button.dataset.card = JSON.stringify(card);
        });
      }

      function revealChosenCard(button, card) {
        selectedCard = card;
        deckCards.forEach((item) => {
          if (item !== button) {
            item.classList.add("is-dimmed");
            item.disabled = true;
            return;
          }
          item.classList.add("is-selected");
          item.disabled = true;
        });

        chooser.classList.add("is-transitioned");

        window.setTimeout(() => {
          button.classList.add("is-revealed");
        }, 220);

        window.setTimeout(() => {
          document.getElementById("message").textContent = card.message;
          document.getElementById("focusValue").textContent = card.focus;
          revealPanel.classList.add("is-visible");
        }, 760);
      }

      const daily = getDailySet();
      document.getElementById("dateLabel").textContent = daily.dateLabel;
      renderDeck(daily.set);

      deckCards.forEach((button) => {
        button.addEventListener("click", () => {
          if (selectedCard) {
            return;
          }
          const card = JSON.parse(button.dataset.card);
          revealChosenCard(button, card);
        });
      });

      document.getElementById("shareButton").addEventListener("click", () => {
        if (!selectedCard) {
          return;
        }

        const payload = {
          title: "Карта дня: " + selectedCard.shareTitle,
          symbol: "✨",
          message: selectedCard.message,
          focus: selectedCard.focus,
          mantra: selectedCard.mantra,
          date_label: daily.dateLabel
        };

        if (tg) {
          tg.sendData(JSON.stringify(payload));
          tg.close();
          return;
        }

        alert("Открой mini app внутри Telegram, чтобы отправить карту в чат.");
      });
    </script>
  </body>
</html>
