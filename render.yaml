services:
  - type: web
    name: astro-bot-flyio
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_HOST
        sync: false
      - key: WEBHOOK_PATH
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_WORKSHEET_NAME
        value: profiles
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
